<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/Projects/calculator.css">
    <title> Fully Functional Calculator</title>
</head>
<body>

    <div id = "main-div" >
     <input type="text"  id = "Display">
     <div class="Button-container">
        <button class="Buttons"onclick=" currentDisplay= ''; document.querySelector('#Display').
     value = currentDisplay;">c</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '1'; document.querySelector('#Display').
     value = currentDisplay;">1</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '2'; document.querySelector('#Display').
     value = currentDisplay;"">2</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '+'; document.querySelector('#Display').
     value = currentDisplay;" >+</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '3'; document.querySelector('#Display').
     value = currentDisplay;">3</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '4'; document.querySelector('#Display').
     value = currentDisplay;">4</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '-'; document.querySelector('#Display').
     value = currentDisplay;" >-</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '5'; document.querySelector('#Display').
     value = currentDisplay;">5</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '6'; document.querySelector('#Display').
     value = currentDisplay;">6</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '*'; document.querySelector('#Display').
     value = currentDisplay;">*</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '7'; document.querySelector('#Display').
     value = currentDisplay;">7</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '8'; document.querySelector('#Display').
     value = currentDisplay;">8</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '/'; document.querySelector('#Display').
     value = currentDisplay;">/</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '9'; document.querySelector('#Display').
     value = currentDisplay;">9</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '0'; document.querySelector('#Display').
     value = currentDisplay;">0</button>
        <button class="Buttons" onclick=" let result = eval(currentDisplay)
         currentDisplay= result ; document.querySelector('#Display').
     value = currentDisplay;">=</button>
        <button class="Buttons" onclick=" currentDisplay= currentDisplay + '.'; document.querySelector('#Display').
     value = currentDisplay;">.</button>
     </div>
    </div>
    

    <script>
     let currentDisplay = ' ';
    document.querySelector('#Display').
     value = currentDisplay;
    </script>
</body>
</html>
