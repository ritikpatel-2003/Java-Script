<!-- Create a method to check if a number is odd
or even -->

<!DOCTYPE html>
<html lang="en">
<head>
     <title>Even-Odd-Checker</title>
</head>
<body>
    <Script>
     function number( num ){
        if (num % 2 === 0){
            return  `${num} is Even Number`;
        }

        else {
            return `${num} is Odd Number`;
        }

     }

     console.log(number(23))
    </Script>
</body>
</html>
