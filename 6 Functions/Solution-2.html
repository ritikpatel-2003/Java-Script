<!-- Create a method to return larger of the two
numbers. -->

<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Checking Larger Number</title>
</head>
<body>
    <Script>
        function numberChecker(num1, num2){
            if (num1>num2){
                return ` ${num1} is Greater than ${num2}`
            }

            else if(num2>num1) {
                return ` ${num2} is Greater than ${num1}`
            }

        }

        console.log(numberChecker(21.9,22))
    </Script>
</body>
</html>
