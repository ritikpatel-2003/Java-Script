<!-- Create Method to convert Celsius to
Fahrenheit -->

<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Tempratue-Converter</title>
</head>
<body>
    <Script>
        function tempConverter(C){
           let F = (9/5)*C+32;
        return `${C} Celcius is equal to ${F} Fahrenheit`;
        }

        console.log(tempConverter(6))
    </Script>
</body>
</html>
