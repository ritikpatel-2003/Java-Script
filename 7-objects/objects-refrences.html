<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Object.Refrences</title>
</head>
<body>
    <Script>

    // It always update the value at where you redefine again matlab sirf  ek hi variable ki value change hogi 
      let a =5;
      let b = a;

      console.log(`a: ${a} , b: ${b}`)

      a = 8;
      console.log(`a: ${a} , b: ${b}`)

    // It Directly Update the Value jaha pein num Sabse phle initialize hua tha (let x = {num :5};)
    // Lekin isme dono Variable ki Value change ho jaayegi
      let x = {num :5};
      let y = x;

      console.log(` x: ${x.num}, y: ${y.num}`);

      x.num = 8;
       console.log(` x: ${x.num}, y: ${y.num}`);
    
    </Script>
</body>
</html>
