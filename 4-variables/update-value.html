<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Update-value</title>
</head>
<body>
    <script>
        // we can only use let while the declaraeation of the variable
        let a =5;
        let b =6;
        
        let c = a+4;
        console.log(c)

        c = b+2;
        console.log(c)

        // short hand operator 

        c += 12;
        console.log(c)
        c -= 12
        console.log(c)
        c *= 12
        console.log(c)
        c /= 12
        console.log(c)
        c++;
        console.log(c)

    </script>
</body>
</html>
